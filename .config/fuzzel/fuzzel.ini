[main]
font = JetBrains Mono:size=12
prompt = "❯ "
width = 100
horizontal-pad = 30
vertical-pad = 30
inner-pad = 5
line-height = 25
letter-spacing = 0.5
icons-enabled = yes

[colors]
background = "#1a1a1afc"
text = "#e5e9f0fc"
prompt = "#e6e6e6fc"
input = "#e5e9f0fc"
match = "#c85050fc"
selection = "#e6e6e6fc"
selection-text = "#1a1a1afc"
selection-match = "#c85050fc"
border = "#8a8a8afc"

[border]
width = 2
radius = 0
